<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DG Bet Automation</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/home.css?v=1" />
  </head>
  <body class="home-page-wrap">
    <main class="home-page">
      <header class="home-header">
        <h1>DG Bet Automation</h1>
        <p class="subtitle">Today's fixture slate from DataGaffer — win outlook, goals, and recommended angles per match.</p>
        <nav class="home-nav" aria-label="Main">
          <a href="/todays-bets">Today's Bets</a>
          <a href="/bet-log">Bet Log</a>
          <a href="/legacy-bet-log">Legacy Bet Log</a>
          <a href="/lm-strat">LM Strat</a>
          <a href="/lm-bet-log">LM Bet Log</a>
        </nav>
        <div class="home-toolbar">
          <button type="button" id="refreshBtn">Refresh from DataGaffer</button>
          <span id="status"></span>
        </div>
        <p class="home-meta">Last scrape: <strong id="scrapedAt">{{ data.scraped_at or "Never" }}</strong></p>
      </header>

      <section class="slate-section" aria-label="Today's slate">
        <h2 class="slate-section-title">Today's Slate</h2>
        <div id="slateCarousel" class="slate-carousel"></div>
      </section>

      <section class="analysis-section" aria-label="Fixture analysis">
        <h2>Fixture analysis</h2>
        <div id="fixtureAnalysis" class="fixture-grid"></div>
      </section>
    </main>

    <script>
      window.INITIAL_SLATE = {{ slate | tojson }};
    </script>
    <script src="/static/home.js?v=1" defer></script>
    <script>
      (function () {
        function boot() {
          if (!window.HomeApp) return;
          HomeApp.init(window.INITIAL_SLATE || []);
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", boot);
        } else {
          boot();
        }
      })();
    </script>
  </body>
</html>
