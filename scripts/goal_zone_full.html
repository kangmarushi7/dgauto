<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Goal Zone</title>
 <!-- ✅ Favicons for all browsers and devices -->
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#003f2e">
<style>
   body {
     font-family: Arial, sans-serif;
     background: #f2f4f7;
     margin: 0;
     padding: 0;
     margin-bottom: 100px;
   }

   .dg-header {
  background: #003f2e;
  color: #ffffff;
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 50;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* Default (mobile + tablet): no box */
.page-shell {
  background: transparent;
}

/* Desktop only (KenPom style) */
@media (min-width: 1000px) {
  body {
    background: #ffffff; /* light blue page */
  }

  .page-shell {
    max-width: 1250px;
    margin: 0 auto;
    background: #f2f4f7;
    min-height: 100vh;
    box-shadow: 0 0 30px rgba(0,0,0,0.15);
    padding-bottom: 60px;
  }
}

.dg-header a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  text-decoration: none;
  color: inherit;
}

/* Logo */
.dg-header .header-logo {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  height: 72px;
  width: auto;
}

/* Title */
.dg-header h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* =========================
   MOBILE HEADER FIX
   ========================= */
@media (max-width: 700px) {
  .dg-header {
    padding: 10px 14px;
  }

  .dg-header .header-logo {
    height: 46px;
    left: 10px;
  }

  .dg-header h1 {
    font-size: 20px;
  }
}

   .header {
     background: #003f2e;
     color: white;
     padding: 10px 20px;
     position: relative;
     display: flex;
     align-items: center;
     justify-content: center;
   }
   .header h1 {
     margin: 0;
     font-size: 32px;
     font-weight: 700;
   }

   /* ✅ Button row */
   .button-row {
     display: flex;
     justify-content: center;
     gap: 15px;
     margin-top: 20px;
   }
   .button-row button {
     padding: 6px 10px;
     font-size: 16px;
     font-weight: bold;
     border: none;
     cursor: pointer;
     border-radius: 25px;
     background: #ffffff;
     border: 2px solid #003f2e;
     transition: background 0.2s;
     color: rgb(0, 48, 41);
   }
   .button-row button.active {
     background: #003f2e;
     color: white;
   }
   .button-row button:hover {
     background: #003f2e;
     color: white;
   }

   .goalzone-container {
     display: flex;
     justify-content: center;
     gap: 20px;
     margin: 30px auto;
     max-width: 850px;
     margin-bottom: 50px;
   }

   .goalzone-table {
     background: #ffffff;
     border: 1.5px solid #000;
     border-collapse: collapse;
     width: 100%;
     table-layout: fixed;
     line-height: 1.0;
   }

   .goalzone-table th {
     background: #f8ff76;
     color: #000000;
     padding: 7px;
     font-size: 14px;
     border-bottom: 1px solid #000000;
   }

   .goalzone-table th:not(:last-child),
   .goalzone-table td:not(:last-child) {
     border-right: 1px solid #000000;
   }

   .goalzone-table td {
     padding: 7px 7px;
     text-align: center;
     line-height: 0.8;
     border-bottom: 1px solid #000000;
   }

   .goalzone-table tr:nth-child(even) { background-color: #edecec; }
   .goalzone-table tr:nth-child(odd)  { background-color: #ffffff; }

  .team-logo {
  width: 24px;
  height: 24px;
  object-fit: contain;   /* 🔑 key fix */
  display: block;
  margin: 0 auto;
}

   /* ✅ Fixed column widths (Totals tab) */
   #match-table th:nth-child(1), #match-table td:nth-child(1) { width: 80%; }
   #match-table th:nth-child(2), #match-table td:nth-child(2) { width: 20%; font-weight: bold;}
   #match-table th:nth-child(1), #match-table th:nth-child(2) { background: #a6e0ff }

   #away-table th:nth-child(1), #away-table td:nth-child(1),
   #home-table th:nth-child(1), #home-table td:nth-child(1) { width: 10%; }

   #away-table th:nth-child(2), #away-table td:nth-child(2),
   #home-table th:nth-child(2), #home-table td:nth-child(2) { width: 40%; }

   #away-table th:nth-child(3), #away-table td:nth-child(3),
   #home-table th:nth-child(3), #home-table td:nth-child(3) { width: 15%; font-weight: bold; }

   /* ✅ Match tab specific widths */
   /* Give the match section its own container width so 300 + 700 + 20 gap fits cleanly */
   .goalzone-container--match { max-width: 850px; }

   /* Match mini-table (left) columns */
   #match2-table th:nth-child(1), #match2-table td:nth-child(1) { width: 80%; }
   #match2-table th:nth-child(2), #match2-table td:nth-child(2) { width: 20%; font-weight: bold; }
   #match2-table th:nth-child(1), #match2-table th:nth-child(2) { background: #a6e0ff; }

   /* Percentages mini-table (right) columns: 5 equal columns */
   #goalprob-table th:nth-child(1), #goalprob-table td:nth-child(1),
   #goalprob-table th:nth-child(2), #goalprob-table td:nth-child(2),
   #goalprob-table th:nth-child(3), #goalprob-table td:nth-child(3),
   #goalprob-table th:nth-child(4), #goalprob-table td:nth-child(4),
   #goalprob-table th:nth-child(5), #goalprob-table td:nth-child(5) { width: 20%; font-weight: bold; }

   #match2-table td,
   #goalprob-table td {
     padding: 14px 7px;  /* or whatever matches logo rows */
   }

   /* ✅ Team table column widths */
   #team-table th:nth-child(1),
   #team-table td:nth-child(1) {
     width: 20%;  /* Logo column narrower */
   }

   #team-table th:nth-child(2),
   #team-table td:nth-child(2) {
     width: 60%;  /* Team name column wider */
   }

   #team-table th:nth-child(3),
   #team-table td:nth-child(3) {
     width: 20%;
      font-weight: bold; /* Total column narrower */
   }

   /* ✅ Hide non-active sections */
   .section { display: none; }
   .section.active { display: block; }

   .search-box {
     text-align: center;
     margin-bottom: 20px;
   }
   .search-box input {
     width: 250px;
     padding: 8px;
     font-size: 14px;
     border: 2px solid #003f2e;
     border-radius: 6px;
     margin-top: 20px;
   }

   /* 🔹 Date navigation (same pattern as XG/Value) */
   .date-nav {
     text-align: center;
     margin: 10px 0 0 0;
     font-size: 20px;
     color: #003f2e;
     font-weight: bold;
     margin-top: 20px ;
   }
   .date-nav span {
     cursor: pointer;
     color: #006644;
     padding: 0 15px;
     font-weight: bold;
   }
   .date-nav span:hover { text-decoration: underline; }
   .date-nav span.active {
     color: #0077cc;  /* blue active like the other pages */
     text-decoration: underline;
   }

/* Player Goals 3-table layout */
#pg-player-table th:nth-child(1),
#pg-player-table td:nth-child(1),
#pg-opponent-table th:nth-child(1),
#pg-opponent-table td:nth-child(1) {
  width: 20%;
}

/* Player Goals 3-table layout */
#pg-player-table th  {
background: #4d79ff;
color: #ffffff;
 
}

#pg-opponent-table th {
background: #ff4d4d;
color: #ffffff;
}

#pg-player-table th:nth-child(2),
#pg-player-table td:nth-child(2),
#pg-opponent-table th:nth-child(2),
#pg-opponent-table td:nth-child(2) {
  width: 75%;
  font-weight: bold;
}

#pg-stats-table th:nth-child(1),
#pg-stats-table td:nth-child(1),
#pg-stats-table th:nth-child(2),
#pg-stats-table td:nth-child(2) {
  width: 50%;
  font-weight: bold;
}

#player-goals-section .team-logo {
  height: 24px;
}

/* --- Player Goals: Desktop Width Control --- */
#player-goals-section .goalzone-container {
  max-width: 700px !important;  /* narrower on web */
  margin: 20px auto !important;
  gap: 20px !important;
}

/* Make each mini-table equal width */
#pg-player-table,
#pg-opponent-table {
  width: 38% !important;
}

#pg-stats-table {
  width: 24% !important;
}

/* Un-bold body rows for Player + Opponent tables */
#pg-player-table tbody td,
#pg-opponent-table tbody td {
  font-weight: normal !important;
}

/* Keep only the header bold */
#pg-player-table thead th,
#pg-opponent-table thead th {
  font-weight: bold !important;
}

/* --- Player Goals sub-tabs (Player / Totals) --- */
.player-button-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 10px;
  margin-bottom: 0;
}

.player-tab-button {
  padding: 6px 20px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 5px;
  border: 2px solid #003f2e;
  background: #ffffff;
  color: #003f2e;
  cursor: pointer;
}

.player-tab-button.active {
  background: #003f2e;
  color: #ffffff;
}

/* hide/show the 2 sub-sections */
.pg-section { display: none; }
.pg-section.active { display: block; }

/* --- Scoring Odds Tables --- */
#pg-totals-player-table th:nth-child(1),
#pg-totals-player-table td:nth-child(1) {
  width: 18%;
}

#pg-totals-player-table th {
  background: #4d79ff;
  color: #ffffff;
}

#pg-totals-player-table th:nth-child(2),
#pg-totals-player-table td:nth-child(2) {
  width: 60%;
  font-weight: bold;
}

#pg-totals-player-table th:nth-child(3),
#pg-totals-player-table td:nth-child(3) {
  width: 22%;
  font-weight: bold;
}

#pg-totals-prob-table th,
#pg-totals-prob-table td {
  width: 25%;
  font-weight: bold;
}

/* --- Player Totals: un-bold column 2 in body rows --- */
#pg-totals-player-table tbody td:nth-child(2) {
    font-weight: normal !important;
}

/* Keep header bold */
#pg-totals-player-table thead th:nth-child(2) {
    font-weight: bold !important;
    
}

.team-link {
  color: #1e6bd6;
  text-decoration: none;
  font-weight: 400;
}

.team-link:hover {
  text-decoration: underline;
}

   /* --- 📱 Mobile adjustments for Goal Zone --- */
   @media (max-width: 925px) {
     body { overflow-x: hidden; }

     /* 🔝 Header & Logo */
     .header-logo { height: 50px !important; width: auto !important; }
     h1 { font-size: 20px !important; }

     /* 📢 Banner */
     .banner {
       width: 85% !important;
       font-size: 14px !important;
       padding: 6px !important;
       margin-top: 10px;
       margin-bottom: 10px;
     }

     /* --- Player Goals: Desktop Width Control --- */
#player-goals-section .goalzone-container {
  max-width: 600px !important;  /* narrower on web */
  margin: 20px 20px !important;
  gap: 10px !important;
}

     /* 🔘 Tab Buttons */
     .button-row {
       gap: 8px !important;
       margin-top: 15px !important;
     }
     .button-row button {
       padding: 6px 10px !important;
       font-size: 12px !important;
       margin: 0 4px !important;
       border: 2px solid #003f2e;
       border-radius: 15px;

     }

     .search-box {
     text-align: center;
     margin-bottom: 20px;
   }
   .search-box input {
     width: 250px;
     padding: 6px;
     font-size: 14px;
     border: 1.9px solid #003f2e;
     border-radius: 6px;
     margin-top: 20px;
     margin-bottom: -5px;
   }

      /* 🔘 Tab Buttons */
     .player-button-row {
       gap: 8px !important;
       margin-top: 25px !important;
     }
     .player-button-row button {
       padding: 6px 10px !important;
       font-size: 12px !important;
       margin: 4px 4px !important;
       border: 1.9px solid #003f2e;
       border-radius: 15px;
     }

     /* 🔹 Mobile date nav */
     .date-nav {
       font-size: 14px !important;
       margin: 12px 0 !important;
       display: flex;
       justify-content: center;
       gap: 12px;
       flex-wrap: wrap;
     }
     .date-nav span {
       padding: 4px 6px !important;
       white-space: nowrap;
     }
     .date-nav .active {
       color: #0077cc !important;
       text-decoration: underline;
     }

     /* 📊 Main table container */
     .goalzone-container,
     .goalzone-container--match {
       max-width: 95% !important;
       gap: 10px !important;
       padding: 0 5px !important;
     }

     /* 📏 Match tab row height fix (make rows same height as logo tables) */
     #match2-table td,
     #goalprob-table td {
       padding-top: 8px !important;
       padding-bottom: 8px !important;
     }

     /* 🪶 Keep side-by-side layout */
     .goalzone-container--match {
       display: flex !important;
       flex-direction: row !important;
       justify-content: space-between !important;
     }

     /* 📏 Totals Tab Table Widths */
     #match-table {
       width: 25% !important;
     }
     #away-table,
     #home-table {
       width: 40% !important;
     }

     /* 📱 Hide match text, show logos (Totals tab) */
     .match-text { display: none !important; }
     .match-logos { display: flex !important; justify-content: center; gap: 6px; }

     /* 📊 Make Total column wider ONLY in Totals Match table */
     #match-table th:nth-child(2),
     #match-table td:nth-child(2) {
       width: 40% !important;
       font-size: 11px !important;
       font-weight: bold !important;
     }
     #match-table th:nth-child(1),
     #match-table td:nth-child(1) {
       width: 60% !important;
     }

     /* 📏 Responsive widths for Match & Team tab side-by-side tables */
     #match2-table,
     #team-table {
       width: 56% !important;
     }
     #goalprob-table,
     #teamprob-table {
       width: 44% !important;
     }

     /* 📈 Tables */
     .goalzone-table {
       font-size: 11px !important;
       table-layout: fixed;
     }
     .goalzone-table th {
       font-size: 10px !important;
       padding: 4px 2px !important;
       line-height: 1.3;
     }
     .goalzone-table td {
       padding: 4px 2px !important;
       font-size: 11px !important;
       line-height: 1.2;
       white-space: nowrap;
       overflow: hidden;
       text-overflow: ellipsis;
     }

     .team-logo {
    width: 18px !important;
    height: 18px !important;
    object-fit: contain;
  }

     /* 🧩 Narrow columns for logo + total in other tables */
     #team-table th:nth-child(1), #team-table td:nth-child(1),
     #team-table th:nth-child(3), #team-table td:nth-child(3),
     #away-table th:nth-child(1), #away-table td:nth-child(1),
     #home-table th:nth-child(1), #home-table td:nth-child(1) {
       width: 15% !important;
     }

     /* 📉 Optional narrower total column in team table */
     #team-table th:nth-child(3), #team-table td:nth-child(3) {
       width: 20% !important;
     }

     /* 📊 Bold the numbers in Team tab */
     #team-table td:nth-child(3),
     #team-table th:nth-child(3) {
       font-weight: bold !important;
     }

     /* 📊 Ensure percentage table columns stay readable */
     #goalprob-table th,
     #goalprob-table td,
     #teamprob-table th,
     #teamprob-table td {
       font-size: 10px !important;
       padding: 4px 2px !important;
       font-weight: bold;
     }

     #away-table th:nth-child(1),
     #away-table td:nth-child(1),
     #home-table th:nth-child(1),
     #home-table td:nth-child(1) {
       width: 18% !important;
     }

     /* Shift the name column slightly narrower to compensate */
     #away-table th:nth-child(2),
     #away-table td:nth-child(2),
     #home-table th:nth-child(2),
     #home-table td:nth-child(2) {
       width: 60% !important;
     }

     /* Keep total column width balanced */
     #away-table th:nth-child(3),
     #away-table td:nth-child(3),
     #home-table th:nth-child(3),
     #home-table td:nth-child(3) {
       width: 22% !important;
     }

     
   }
</style>
</head>
<body>
  <div class="page-shell">

<div class="dg-header">
  <a href='/dashboard'>
    <img
      src="https://cdn.prod.website-files.com/682236b4aa8cdb4803142afd/68b8aa71d38f0c8d4c140700_everything-236.png"
      alt="DG Logo"
      class="header-logo"
    />
    <h1>Goal Zone</h1>
  </a>
</div>

<!-- 🔹 Date navigation (exactly like XG/Value pages) -->
<div class="date-nav">
  <span onclick="switchDay('yesterday')">&laquo; Yesterday</span>
  <span id="currentDate" class="active">Today's Fixtures</span>
  <span onclick="switchDay('tomorrow')">Tomorrow &raquo;</span>
</div>

<!-- 📊 Banner -->
<div id="goalzone-banner" class="banner" style="
  text-align: center;
  font-size: 20px;
  margin: 20px auto;
  color: #003f2e;
  background: #ffffff;
  padding: 10px;
  border: 2px solid #003f2e;
  width: 50%;
  border-radius: 4px;
  margin-bottom: 20px;
  margin-top: 20px;
  line-height: 1.5;
  font-weight: 600;
">
  Goal totals, player goals and scoring probabilities from 10,000 match simulations
</div>

<!-- ✅ Button Row -->
<div class="button-row">
 <button class="tab-button active" data-target="totals-section">Totals</button>
 <button class="tab-button" data-target="match-section">Match</button>
 <button class="tab-button" data-target="team-section">Team</button>
</div>

<!-- 🔍 Search Box -->
<div class="search-box">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search team, matchup, or league..." 
    onkeyup="applySearch()" 
  />
</div>

<!-- ✅ Totals Section (your current table wrapped) -->
<div id="totals-section" class="section active">
 <div class="goalzone-container">
   <table class="goalzone-table" id="match-table">
     <thead>
       <tr><th>Match</th><th>Total</th></tr>
     </thead>
     <tbody id="match-body"></tbody>
   </table>

   <table class="goalzone-table" id="home-table">
     <thead>
       <tr><th></th><th>Home</th><th>Total</th></tr>
     </thead>
     <tbody id="home-body"></tbody>
   </table>

   <table class="goalzone-table" id="away-table">
     <thead>
       <tr><th></th><th>Away</th><th>Total</th></tr>
     </thead>
     <tbody id="away-body"></tbody>
   </table>
 </div>
</div>

<!-- ✅ Match Section (two mini tables side-by-side with fixed widths) -->
<div id="match-section" class="section">
  <div class="goalzone-container goalzone-container--match">
    <!-- Left: Match | Total -->
    <table class="goalzone-table" id="match2-table" style="width:400px">
      <thead>
        <tr><th>Match</th><th>Total</th></tr>
      </thead>
      <tbody id="match2-body"></tbody>
    </table>

    <!-- Right: Percentages 1+..5+, no Match column -->
    <table class="goalzone-table" id="goalprob-table" style="width:400px">
      <thead>
        <tr><th>1+</th><th>2+</th><th>3+</th><th>4+</th><th>5+</th></tr>
      </thead>
      <tbody id="goalprob-body"></tbody>
    </table>
  </div>
</div>

<div id="team-section" class="section">
  <div class="goalzone-container goalzone-container--match">
    <table class="goalzone-table" id="team-table" style="width:400px">
      <thead>
        <tr><th></th><th>Team</th><th>Total</th></tr>
      </thead>
      <tbody id="team-body"></tbody>
    </table>

    <table class="goalzone-table" id="teamprob-table" style="width:400px">
      <thead>
        <tr><th>1+</th><th>2+</th><th>3+</th><th>4+</th><th>5+</th></tr>
      </thead>
      <tbody id="teamprob-body"></tbody>
    </table>
  </div>
</div>

<!-- ✅ Empty Team Section placeholder (unchanged) -->
<div id="team-section" class="section"></div>

<!-- 🔥 Player Goal Zone (3 mini tables) -->
<div id="player-goals-section">

  <!-- Sub-tab buttons: Player / Totals -->
  <div class="player-button-row">
    <button class="player-tab-button active" data-target="pg-player-section">Player Rates</button>
    <button class="player-tab-button" data-target="pg-totals-section">Scoring Odds</button>
  </div>

  <!-- PLAYER VIEW: the 3 tables you already use -->
  <div id="pg-player-section" class="pg-section active">
    <div class="goalzone-container">
      <!-- TABLE 1: Logo | Player -->
      <table class="goalzone-table" id="pg-player-table">
        <thead>
          <tr><th></th><th>Player</th></tr>
        </thead>
        <tbody id="pg-player-body"></tbody>
      </table>

      <!-- TABLE 2: Logo | Opponent -->
      <table class="goalzone-table" id="pg-opponent-table">
        <thead>
          <tr><th></th><th>Opponent</th></tr>
        </thead>
        <tbody id="pg-opponent-body"></tbody>
      </table>

      <!-- TABLE 3: Per 90 | 1+ G % -->
      <table class="goalzone-table" id="pg-stats-table">
        <thead>
          <tr><th>Per 90</th><th>1+ G%</th></tr>
        </thead>
        <tbody id="pg-stats-body"></tbody>
      </table>
    </div>
  </div>

  <div id="pg-totals-section" class="pg-section">
  <div class="goalzone-container">

    <!-- TABLE 1: Logo | Player | Per90 -->
    <table class="goalzone-table" id="pg-totals-player-table">
      <thead>
        <tr>

  return "player_simulations";
}

async function loadAllPlayers(fixtures) {
  const folder = getPlayerFolder();

  const res = await fetch(`${folder}/all_teams.json`);
  const all = await res.json();

  const teamIds = new Set();
  fixtures.forEach(f => {
    teamIds.add(Number(f.home.id));
    teamIds.add(Number(f.away.id));
  });

  return all.filter(p =>

    (p.goals_per90_simulated || 0) >= 0.30
  );

/* ======= Gradient helpers ======= */
function colorFromRatio(ratio, colorLow, colorHigh) {
  const r = Math.round(colorLow.r + ratio * (colorHigh.r - colorLow.r));
  const g = Math.round(colorLow.g + ratio * (colorHigh.g - colorLow.g));
  const b = Math.round(colorLow.b + ratio * (colorHigh.b - colorLow.b));
  return `rgb(${r},${g},${b})`;
}

function getBlueGradient(value, min, max) {
  if (!isFinite(value)) return "white";
  const ratio = (value - min) / (max - min + 1e-6);
  return colorFromRatio(
  Math.pow(ratio, 1.0),
  { r:255,g:255,b:255 },
  { r:0,g:160,b:255 }
);
}

function getValueGradient(value, min, max) {
  if (!isFinite(value)) return "white";

  const ratio = (value - min) / (max - min + 1e-6);

  if (ratio < 0.5) {
    const t = (0.5 - ratio) / 0.5;

    return colorFromRatio(
      Math.pow(t, 5.0),   // 🔥 more white on red side
      { r:255, g:255, b:255 },
      { r:220, g:80, b:80 }
    );

  } else {
    const t = (ratio - 0.5) / 0.5;

    return colorFromRatio(
      Math.pow(t, 1.0),   // 🔥 softer green side
      { r:255, g:255, b:255 },
      { r:0, g:180, b:0 }
    );
  }
}
/* ======= /Gradient helpers ======= */

/* ======= Poisson helpers ======= */
function factorial(n) { let r=1; for (let i=2;i<=n;i++) r*=i; return r; }
function poissonPMF(k, lambda) { return Math.exp(-lambda) * Math.pow(lambda, k) / factorial(k); }
function probAtLeast(n, lambda) {
  if (n <= 0) return 1;
  let cdf = 0;
  for (let k = 0; k <= n - 1; k++) cdf += poissonPMF(k, lambda);
  return 1 - cdf;
}
/* ======= /Poisson helpers ======= */

/* ======= Core render function (unchanged) ======= */
function renderEverything(fixtures) {

  if (!profile?.is_subscribed) {
    console.warn("Not subscribed → redirecting to subscribe page");
    window.location.href = "subscribe.html";
    return;
  }

  // ✅ Allow only active monthly/yearly users
  if (profile.plan === "monthly" || profile.plan === "yearly") {
    console.log("✅ Active plan:", profile.plan, "→ Showing page");
    document.body.style.display = "block";
  } else {
    console.warn("User has unsupported plan:", profile.plan);
    window.location.href = "subscribe.html";
  }
})();
</script>
